name: Python Test

on:
  push:

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install libraries
      run: pip install -r requirements.txt

    - name: Run Python Script
      run: python test_google.py
